<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPS Arena{% if title %} — {{ title }}{% endif %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: #0d1117;
      --surface2: #111827;
      --border: #1e2a3a;
      --accent: #00f5d4;
      --accent2: #f72585;
      --accent3: #7b2fff;
      --text: #c9d6e3;
      --muted: #4a5568;
      --win: #00f5d4;
      --lose: #f72585;
      --draw: #f9c74f;
      --glow: 0 0 20px rgba(0,245,212,0.4);
      --glow2: 0 0 20px rgba(247,37,133,0.4);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,212,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,8,16,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      backdrop-filter: blur(10px);
    }

    .nav-brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 4px;
      text-shadow: var(--glow);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-user {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .nav-user span { color: var(--accent); font-weight: 600; }

    .nav-btn {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid var(--accent2);
      border-radius: 2px;
      color: var(--accent2);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--accent2); color: var(--bg); }

    /* MAIN CONTENT */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }
    .card.alt::before {
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent3), transparent);
    }

    /* SECTION LABEL */
    .section-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* FORM FIELDS */
    .field { margin-bottom: 22px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .field input {
      width: 100%;
      background: rgba(0,245,212,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--glow);
    }
    .field input::placeholder { color: var(--muted); }

    /* BUTTONS */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 2px;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: -1;
    }
    .btn:hover { color: var(--bg); box-shadow: var(--glow); }
    .btn:hover::before { transform: translateX(0); }

    .btn.full { width: 100%; text-align: center; }

    .btn.danger {
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .btn.danger::before { background: var(--accent2); }
    .btn.danger:hover { color: var(--bg); box-shadow: var(--glow2); }

    /* ALERTS */
    .alert {
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .alert.error {
      background: rgba(247,37,133,0.1);
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }
    .alert.info {
      background: rgba(0,245,212,0.06);
      border: 1px solid rgba(0,245,212,0.3);
      color: var(--accent);
    }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 2px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
    }
    .badge.Win  { background: rgba(0,245,212,0.12); color: var(--win);  border: 1px solid rgba(0,245,212,0.3); }
    .badge.Lose { background: rgba(247,37,133,0.12); color: var(--lose); border: 1px solid rgba(247,37,133,0.3); }
    .badge.Draw { background: rgba(249,199,79,0.12);  color: var(--draw); border: 1px solid rgba(249,199,79,0.3); }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <!-- NAV — only shown when user is logged in -->
  {% if user %}
  <nav>
    <a href="/home" class="nav-brand">RPS ARENA</a>
    <div class="nav-right">
      <div class="nav-user">PLAYER <span>#{{ user.id }}</span></div>
      <a href="/logout" class="nav-btn">Logout</a>
    </div>
  </nav>
  {% else %}
  <nav>
    <span class="nav-brand">RPS ARENA</span>
    <div class="nav-right">
      <a href="/" class="nav-btn" style="border-color:var(--accent);color:var(--accent);">Login</a>
    </div>
  </nav>
  {% endif %}

  <div class="page-wrapper">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
